<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link rel="stylesheet" href="anki.style.css">
  </head>
  <body>
    <!-- Anki card content here -->

    <span class="sink-japanese-template-front"></span>
    <div class="page" lang="ja">
      <div class="box">
        <div class="container">
          <div class="vertical word">
            <span class="kanji">
              {{Word}}
            </span>
          </div>
          <div>
            <div class="expression">{{Expression}}</div>
          </div>
        </div>
      </div>
    </div>
    <div class="native">
      <span class="part-of-speech">{{Part of Speech}}</span>
    </div>
    <script src="anki.js"></script>

    <!-- Anki card content there -->
  </body>
</html>
