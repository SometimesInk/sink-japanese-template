<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link rel="stylesheet" href="anki.style.css">
  </head>
  <body>
    <!-- Anki card content here -->

    <span style="display:none;" class="sink-japanese-template-front"></span>
    <span style="display:none;" class="sink-japanese-template-counter">1</span>
    <div class="page" lang="ja">
      <div class="box">
        <div class="container">
          <div class="vertical word">
            <span class="kanji">
              {{#Prefix}}
              {{Prefix}}
              {{/Prefix}}

              {{Word}}

              {{#Suffix}}
              {{Suffix}}
              {{/Suffix}}
            </span>
          </div>
          <div>
            <div class="expression expression-front">{{Expression}}</div>
          </div>
        </div>
      </div>
    </div>
    <div class="native">
      <span class="tags">{{Tags}}</span>
    </div>
    <script src="anki.js"></script>

    <!-- Anki card content there -->
  </body>
</html>
