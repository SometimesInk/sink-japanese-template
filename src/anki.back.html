<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link rel="stylesheet" href="anki.style.css">
  </head>
  <body>
    <div style="display:none;" class="replay-button" onclick="alert('Audio played')"></div>
    <!-- Anki card content here -->

    <span style="display:none;" class="sink-japanese-template-back"></span>
    <span style="display:none;" class="sink-japanese-template-counter">1</span>
    <div class="page" lang="ja">
      <div class="box">
        <div class="container">
          <div class="vertical word">
            <span class="kanji">
              {{furigana:Furigana}}
            </span>
          </div>
          <div>
            <div class="expression">{{furigana:Reading}}</div>
            <div class="hr">
              <span>❦</span>
            </div>
            <div class="definition">{{Meaning}}</div>
            <div class="hr">
              <span>❦</span>
            </div>
            {{Pitch Accent Graph}}
          </div>
        </div>
        <div class="bottom">
          <div class="audio">㋔</div>
        </div>
      </div>
    </div>
    <div class="native">
      <span class="part-of-speech">{{Part of Speech}}</span>
      {{Word Audio}}
    </div>
    <script src="anki.js"></script>

    <!-- Anki card content there -->
  </body>
</html>
